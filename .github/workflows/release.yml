name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p homn-bin
      - name: Package
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGE="homn-${TAG}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/homn" "$STAGE/"
          strip "$STAGE/homn" || true
          cp LICENSE README.md "$STAGE/"
          cp -r policies "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          else
            shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homn-${{ matrix.target }}
          path: |
            homn-*.tar.gz
            homn-*.tar.gz.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/homn-*.tar.gz
            dist/homn-*.tar.gz.sha256
