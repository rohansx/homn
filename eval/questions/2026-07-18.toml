# Phase 0 recall eval — question set authored from the actual captured week.
#
# Captured window: 2026-07-18, ~13:39–14:24 UTC (screenpipe running ~45 min).
# Capture contents at gate time:
#   - screen OCR: a static Konsole "File" menu (File / New Window / New Tab / Built-in /
#     Default profile / Clone Tab / Save Output As / Auto Save Output As), 12 identical frames.
#   - audio: 168 transcriptions of background media (a YouTube video) via the mic — phrases
#     like "if you want to do something like this, you can do it", "use a free machine for a
#     long time", "make a balance between the two step", "one of the best moments to do",
#     "all our music", "I'm gonna go to the next one", "try to do this by yourself".
#
# CAVEAT: this is a thin, non-representative sample (~45 min; no real work activity on screen;
# audio is background media, not the user's speech). The recall@3 number this set produces is a
# *pipeline validation on real capture*, NOT a brain-architecture decision. The verdict is
# deferred until a real 5–7 day working week with intentional dictation (see research.md R1).
#
# Questions are grounded in the actual captured text; expected_ref is a distinctive phrase that
# appears in a captured chunk (the scorer's substring fallback matches on hit text).

[meta]
captured_week = "2026-07-18/2026-07-18"
authored_by = "homn-phase0"
k = 3

