# Phase 0 synthetic-flow question set — a deterministic "work week" for testing the
# full homn flow without waiting for real capture.
#
# The corpus is built in crates/homn-eval/tests/synthetic_flow.rs (a screenpipe-shaped
# sqlite + a dictation.jsonl) representing Mon–Fri 2026-07-13..17 of a developer ("Rohan")
# working on homn, with 4 people (Sarah PM, Priya backend, Marco customer, Chris design),
# explicit commitments, a revising belief about the brain, and temporal structure.
#
# This set is NOT a recall-quality gate (that needs a real week). It is a flow/regression
# test: does ingest → agidb → recall → score → verdict run end-to-end and surface the right
# chunks? expected_ref is a distinctive phrase present verbatim in the answering chunk.

[meta]
captured_week = "2026-07-13/2026-07-17"
authored_by = "homn-synthetic"
k = 3

